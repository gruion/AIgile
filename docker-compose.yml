services:
  # ─── Jira Software (Data Center) ───────────────────────────
  jira:
    image: atlassian/jira-software:9.12-jdk17
    container_name: jira-dashboard-jira
    ports:
      - "9080:8080"
    environment:
      - ATL_JDBC_URL=jdbc:postgresql://jira-db:5432/jira
      - ATL_JDBC_USER=jira
      - ATL_JDBC_PASSWORD=${JIRA_DB_PASSWORD}
      - ATL_DB_DRIVER=org.postgresql.Driver
      - ATL_DB_TYPE=postgres72
      - JVM_MINIMUM_MEMORY=1024m
      - JVM_MAXIMUM_MEMORY=2048m
    volumes:
      - jira-data:/var/atlassian/application-data/jira
    depends_on:
      jira-db:
        condition: service_healthy
    networks:
      - jira-net
    restart: unless-stopped

  # ─── PostgreSQL for Jira ───────────────────────────────────
  jira-db:
    image: postgres:15-alpine
    container_name: jira-dashboard-db
    environment:
      - POSTGRES_DB=jira
      - POSTGRES_USER=jira
      - POSTGRES_PASSWORD=${JIRA_DB_PASSWORD}
    volumes:
      - jira-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jira-net
    restart: unless-stopped

  # ─── Backend API (Jira proxy) ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: jira-dashboard-api
    ports:
      - "${API_PORT:-3011}:3001"
    env_file:
      - path: .env
        required: false
    environment:
      - API_PORT=3001
      - CONFIG_DIR=/data
    volumes:
      - dashboard-config:/data
    networks:
      - jira-net
    restart: unless-stopped

  # ─── Frontend (Next.js Dashboard) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jira-dashboard-frontend
    ports:
      - "${FRONTEND_PORT:-3010}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-3011}
    depends_on:
      - api
    networks:
      - jira-net
    restart: unless-stopped

volumes:
  jira-data:
  jira-db-data:
  dashboard-config:

networks:
  jira-net:
    driver: bridge
