services:
  # ─── Backend API (Jira proxy) ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: jira-dashboard-api
    ports:
      - "${API_PORT:-3011}:3001"
    env_file:
      - path: .env
        required: false
    environment:
      - API_PORT=3001
      - CONFIG_DIR=/data
    volumes:
      - dashboard-config:/data
    networks:
      - dashboard-net
    restart: unless-stopped

  # ─── Frontend (Next.js Dashboard) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jira-dashboard-frontend
    ports:
      - "${FRONTEND_PORT:-3010}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-3011}
    depends_on:
      - api
    networks:
      - dashboard-net
    restart: unless-stopped

volumes:
  dashboard-config:

networks:
  dashboard-net:
    driver: bridge
