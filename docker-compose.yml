services:
  # ─── Backend API (Jira proxy) ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: aigilecoach-api
    ports:
      - "${API_PORT:-3011}:3001"
    env_file:
      - path: .env
        required: false
    environment:
      - API_PORT=3001
      - CONFIG_DIR=/data
    volumes:
      - dashboard-config:/data
    restart: unless-stopped

  # ─── Frontend (Next.js Dashboard) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aigilecoach-frontend
    ports:
      - "${FRONTEND_PORT:-3010}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-3011}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  dashboard-config:
