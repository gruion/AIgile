# ============================================================
# AIgileCoach — OpenShift Manifests (Lite — external Jira)
# Jira connection configured from Settings UI, no .env needed
#
# Build images:
#   docker build -t aigilecoach-api -f api/Dockerfile .
#   docker build -t aigilecoach-frontend \
#     --build-arg NEXT_PUBLIC_API_URL=http://aigilecoach-api.example.com \
#     ./frontend
# ============================================================

# ─── Namespace ───────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: aigilecoach
  labels:
    app.kubernetes.io/part-of: aigilecoach

---
# ─── PVC for API config persistence ─────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dashboard-config
  namespace: aigilecoach
  labels:
    app.kubernetes.io/part-of: aigilecoach
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
# ═════════════════════════════════════════════════════════════
# API Backend
# ═════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aigilecoach
  labels:
    app: api
    app.kubernetes.io/part-of: aigilecoach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: aigilecoach-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: API_PORT
              value: "3001"
            - name: CONFIG_DIR
              value: "/data"
          volumeMounts:
            - name: config
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /config/status
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /config/status
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: dashboard-config

---
apiVersion: v1
kind: Service
metadata:
  name: aigilecoach-api
  namespace: aigilecoach
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - port: 3001
      targetPort: 3001

---
# ═════════════════════════════════════════════════════════════
# Frontend (Next.js)
# ═════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aigilecoach
  labels:
    app: frontend
    app.kubernetes.io/part-of: aigilecoach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: aigilecoach-frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: aigilecoach-frontend
  namespace: aigilecoach
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000

---
# ═════════════════════════════════════════════════════════════
# OpenShift Routes
# ═════════════════════════════════════════════════════════════

# Frontend route (main UI)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aigilecoach
  namespace: aigilecoach
  labels:
    app: frontend
    app.kubernetes.io/part-of: aigilecoach
  annotations:
    haproxy.router.openshift.io/timeout: 60s
spec:
  host: aigilecoach.example.com
  port:
    targetPort: 3000
  to:
    kind: Service
    name: aigilecoach-frontend
    weight: 100

---
# API route (browser needs direct access for fetch calls)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aigilecoach-api
  namespace: aigilecoach
  labels:
    app: api
    app.kubernetes.io/part-of: aigilecoach
  annotations:
    haproxy.router.openshift.io/timeout: 120s
spec:
  host: aigilecoach-api.example.com
  port:
    targetPort: 3001
  to:
    kind: Service
    name: aigilecoach-api
    weight: 100
