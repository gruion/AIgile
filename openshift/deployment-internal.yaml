# ============================================================
# AIgileCoach — OpenShift Manifests (External API Route)
# Both frontend and API are exposed via Routes.
#
# Build & push images:
#   docker build --platform linux/amd64 -t gruion/all:aigilecoach-api-v1.1 -f api/Dockerfile .
#   docker build --platform linux/amd64 -t gruion/all:aigilecoach-frontend-v1.1 ./frontend
#   docker push gruion/all:aigilecoach-api-v1.1
#   docker push gruion/all:aigilecoach-frontend-v1.1
# ============================================================

# ─── Namespace ───────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: aigilecoach
  labels:
    app.kubernetes.io/part-of: aigilecoach

---
# ═════════════════════════════════════════════════════════════
# API Backend
# ═════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aigilecoach
  labels:
    app: api
    app.kubernetes.io/part-of: aigilecoach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: gruion/all:aigilecoach-api-v1.1
          ports:
            - containerPort: 3001
          env:
            - name: API_PORT
              value: "3001"
            - name: CONFIG_DIR
              value: "/data"
          volumeMounts:
            - name: config
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /config/status
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /config/status
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: aigilecoach-api
  namespace: aigilecoach
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - port: 3001
      targetPort: 3001

---
# ═════════════════════════════════════════════════════════════
# Frontend (Next.js)
# ═════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aigilecoach
  labels:
    app: frontend
    app.kubernetes.io/part-of: aigilecoach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gruion/all:aigilecoach-frontend-v1.1
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://aigilecoach-api.example.com"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: aigilecoach-frontend
  namespace: aigilecoach
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000

---
# ═════════════════════════════════════════════════════════════
# OpenShift Routes
# ═════════════════════════════════════════════════════════════

apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aigilecoach
  namespace: aigilecoach
  labels:
    app: frontend
    app.kubernetes.io/part-of: aigilecoach
  annotations:
    haproxy.router.openshift.io/timeout: 120s
spec:
  host: aigilecoach.example.com
  port:
    targetPort: 3000
  to:
    kind: Service
    name: aigilecoach-frontend
    weight: 100

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aigilecoach-api
  namespace: aigilecoach
  labels:
    app: api
    app.kubernetes.io/part-of: aigilecoach
  annotations:
    haproxy.router.openshift.io/timeout: 120s
spec:
  host: aigilecoach-api.example.com
  port:
    targetPort: 3001
  to:
    kind: Service
    name: aigilecoach-api
    weight: 100
