## Standalone Jira instance — independent from AIgileCoach
## Usage: docker compose -f docker-compose.jira.yml up -d

services:
  jira:
    image: atlassian/jira-software:9.12-jdk17
    container_name: jira-dashboard-jira
    ports:
      - "${JIRA_PORT:-9080}:8080"
    environment:
      - ATL_JDBC_URL=jdbc:postgresql://jira-db:5432/jira
      - ATL_JDBC_USER=jira
      - ATL_JDBC_PASSWORD=${JIRA_DB_PASSWORD:-jira_secret}
      - ATL_DB_DRIVER=org.postgresql.Driver
      - ATL_DB_TYPE=postgres72
      - JVM_MINIMUM_MEMORY=1024m
      - JVM_MAXIMUM_MEMORY=2048m
    volumes:
      - jira-data:/var/atlassian/application-data/jira
    depends_on:
      jira-db:
        condition: service_healthy
    networks:
      - jira-internal
      - shared-net
    restart: unless-stopped

  jira-db:
    image: postgres:15-alpine
    container_name: jira-dashboard-db
    environment:
      - POSTGRES_DB=jira
      - POSTGRES_USER=jira
      - POSTGRES_PASSWORD=${JIRA_DB_PASSWORD:-jira_secret}
    volumes:
      - jira-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jira-internal
    restart: unless-stopped

volumes:
  jira-data:
  jira-db-data:

networks:
  jira-internal:
    driver: bridge
  shared-net:
    name: aigilecoach-net
    external: true
